services:
  - type: web
    name: burnout-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: CORS_ORIGIN
        value: "https://burnout-detection-system-v212.vercel.app"
      - key: ML_SERVICE_URL
        value: "https://ml-service-1nhu.onrender.com"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false

  - type: web
    name: ml-service
    env: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false